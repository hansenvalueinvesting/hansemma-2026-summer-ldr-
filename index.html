<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our summer on call</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
<style>
  :root{
    /* warm dusk — two people under the same sunset */
    --night:#1c1733;        /* deep evening indigo */
    --night-2:#2a2147;      /* lifted panel */
    --dusk:#3d2f54;
    --peach:#ffb38a;        /* low sun */
    --coral:#ff7e6b;        /* sun core */
    --rose:#ff9fb2;         /* afterglow */
    --gold:#ffd79a;         /* warm highlight */
    --cream:#fbeede;        /* primary text */
    --muted:#b9a9c9;        /* secondary text */
    --line:rgba(255,210,170,.12);
    --shadow:0 18px 50px -22px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Nunito Sans',sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,126,107,.28), transparent 55%),
      radial-gradient(90% 60% at 85% 8%, rgba(255,159,178,.18), transparent 50%),
      linear-gradient(180deg, #2a2147 0%, #1c1733 45%, #160f29 100%);
    background-attachment:fixed;
    min-height:100vh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:clamp(28px,5vw,64px) clamp(18px,4vw,40px) 80px}

  /* ---- hero ---- */
  .hero{text-align:center;position:relative;padding:34px 0 14px}
  .eyebrow{
    font-size:13px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--peach);font-weight:700;margin-bottom:18px;opacity:.85
  }
  .hero h1{
    font-family:'Fraunces',serif;font-weight:500;font-style:italic;
    font-size:clamp(38px,7vw,76px);line-height:1.02;color:var(--cream);
    letter-spacing:-.01em;
  }
  .hero h1 .nf{font-style:normal;font-weight:400}
  .sub{margin-top:14px;color:var(--muted);font-size:clamp(15px,2vw,17px)}
  .sub b{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}

  /* the sun countdown: signature element — sun drifts across the summer */
  .countdown{max-width:620px;margin:46px auto 6px;padding:0 27px}
  .track{position:relative;height:3px;border-radius:3px;
    background:linear-gradient(90deg,rgba(255,210,170,.30),rgba(255,210,170,.10))}
  .track-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;
    background:linear-gradient(90deg,var(--peach),var(--coral));
    box-shadow:0 0 14px rgba(255,126,107,.55);transition:width .9s ease}
  .sun{
    position:absolute;top:50%;left:0;width:46px;height:46px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 38% 34%, var(--gold), var(--coral) 62%, var(--rose));
    box-shadow:0 0 32px 6px rgba(255,126,107,.55), 0 0 70px 18px rgba(255,159,178,.25);
    transition:left .9s ease;
  }
  .count-caption{margin-top:30px;color:var(--muted);font-size:14.5px;letter-spacing:.01em}
  .count-caption b{color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
  .ticker{display:flex;justify-content:center;gap:10px;margin-top:16px}
  .ticker .unit{display:flex;flex-direction:column;align-items:center;min-width:50px;
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:10px 8px 8px}
  .ticker .unit b{font-family:'Fraunces',serif;font-weight:500;font-size:27px;line-height:1;
    color:var(--cream);font-variant-numeric:tabular-nums}
  .ticker .unit i{font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--peach);font-style:normal;margin-top:6px;opacity:.85}

  /* ---- stat grid ---- */
  .grid{display:grid;gap:16px;margin-top:30px}
  .stats{grid-template-columns:repeat(4,1fr)}
  @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
  .card{
    background:linear-gradient(180deg, rgba(61,47,84,.55), rgba(42,33,71,.5));
    border:1px solid var(--line);border-radius:20px;padding:22px 20px;
    box-shadow:var(--shadow);backdrop-filter:blur(6px);position:relative;overflow:hidden
  }
  .card .k{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .card .v{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(30px,4.4vw,42px);
    line-height:1.05;margin-top:10px;color:var(--cream);font-variant-numeric:tabular-nums}
  .card .v small{font-size:.42em;color:var(--peach);font-family:'Nunito Sans';font-weight:700;letter-spacing:.04em}
  .card .cap{margin-top:6px;font-size:13px;color:var(--muted)}

  /* ---- panels ---- */
  .panel{
    background:linear-gradient(180deg, rgba(61,47,84,.5), rgba(42,33,71,.46));
    border:1px solid var(--line);border-radius:22px;padding:26px 24px;box-shadow:var(--shadow)
  }
  .panel h2{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:24px;color:var(--gold);
    margin-bottom:4px
  }
  .panel .lead{color:var(--muted);font-size:13.5px;margin-bottom:20px}

  /* % on call bar */
  .pct-big{font-family:'Fraunces',serif;font-weight:500;font-size:52px;color:var(--rose);line-height:1;font-variant-numeric:tabular-nums}
  .pct-big small{font-size:.4em;color:var(--muted);font-family:'Nunito Sans';font-weight:700}
  .bar{height:16px;border-radius:10px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:20px;position:relative}
  .bar > i{display:block;height:100%;border-radius:10px;
    background:linear-gradient(90deg,var(--peach),var(--coral),var(--rose));
    box-shadow:0 0 18px rgba(255,126,107,.5)}
  .bar-note{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-top:9px}

  /* ---- records ---- */
  .records{margin-top:16px}
  .rec-list{display:grid;gap:14px;grid-template-columns:repeat(3,1fr)}
  @media(max-width:760px){.rec-list{grid-template-columns:1fr}}
  .rec{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:16px;
    background:rgba(255,255,255,.04);border:1px solid var(--line)}
  .rec .ico{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:20px;
    background:linear-gradient(180deg,rgba(255,179,138,.22),rgba(255,126,107,.14))}
  .rec .rk{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .rec .rv{font-family:'Fraunces',serif;font-size:20px;color:var(--cream);margin-top:2px}
  .rec .rd{font-size:12.5px;color:var(--peach);margin-top:1px}

  /* ---- heatmap ---- */
  .heat-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .heat-scroll{overflow-x:auto;padding-bottom:8px}
  .heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:5px;width:max-content}
  .cell{width:15px;height:15px;border-radius:4px;background:rgba(255,255,255,.05);position:relative}
  .cell[data-out="1"]{outline:1px solid rgba(255,255,255,.04)}
  .legend{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-top:14px}
  .legend .sw{width:14px;height:14px;border-radius:4px}
  .tip{position:fixed;z-index:50;pointer-events:none;background:#120c22;color:var(--cream);
    border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12.5px;
    box-shadow:0 10px 30px rgba(0,0,0,.6);opacity:0;transform:translateY(4px);transition:opacity .12s;max-width:200px}
  .tip b{color:var(--gold)}
  .tip.show{opacity:1;transform:translateY(0)}

  /* ---- log ---- */
  .log-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  .log{margin-top:14px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}
  .row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
    padding:13px 18px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--line);font-size:14.5px}
  .row:last-child{border-bottom:0}
  .row:nth-child(odd){background:rgba(255,255,255,.035)}
  .row .dir{font-size:15px}
  .row .date{color:var(--cream);font-weight:600}
  .row .time{color:var(--muted);font-size:13px}
  .row .dur{font-variant-numeric:tabular-nums;color:var(--gold);font-weight:700;text-align:right}
  .row .meta{text-align:right;color:var(--muted);font-size:12px}

  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:46px;font-style:italic;font-family:'Fraunces',serif}
  footer .heart{color:var(--coral)}
  .err{background:rgba(255,126,107,.12);border:1px solid var(--coral);border-radius:14px;padding:20px;color:var(--cream);margin-top:20px}
  .sec-label{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--peach);
    font-weight:700;margin:48px 0 16px;opacity:.85}
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <div class="eyebrow">long distance · summer ’26</div>
    <h1><span class="nf">our</span> summer <span class="nf">on</span> call</h1>
    <p class="sub" id="subline">every minute we closed the distance</p>
    <div class="countdown" id="countdown">
      <div class="track"><i class="track-fill" id="trackFill"></i><span class="sun" id="sun"></span></div>
      <p class="count-caption" id="countCaption"></p>
      <div class="ticker" id="ticker" aria-label="total time until reunion">
        <span class="unit"><b id="cd-h">--</b><i>hrs</i></span>
        <span class="unit"><b id="cd-m">--</b><i>min</i></span>
        <span class="unit"><b id="cd-s">--</b><i>sec</i></span>
      </div>
    </div>
  </header>

  <div id="app"></div>

  <footer>kept close, <span class="heart">♥</span> <span id="span-dates"></span></footer>
</div>

<div class="tip" id="tip"></div>

<script>
const DATA_URL = "calls.json";

const fmtDur = m => {
  if(!m) return "—";
  const h = Math.floor(m/60), mm = m%60;
  return h ? (mm ? `${h}h ${mm}m` : `${h}h`) : `${mm}m`;
};
const fmtLongDur = m => {
  const h = Math.floor(m/60), mm = m%60;
  if(h && mm) return `${h} hr ${mm} min`;
  if(h) return `${h} hr`;
  return `${mm} min`;
};
const prettyDate = iso => {
  const [y,mo,d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y,mo-1,d));
  return dt.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",timeZone:"UTC"});
};
const shortDate = iso => {
  const [,mo,d] = iso.split("-").map(Number);
  return `${d}/${mo}`;
};

fetch(DATA_URL, {cache:"no-store"})
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => {
    document.getElementById("app").innerHTML =
      `<div class="err"><b>Couldn't load the call log.</b><br>Make sure <code>calls.json</code> sits next to this page and is valid JSON. (${e.message})</div>`;
  });

function render(data){
  const calls = data.calls.slice();
  const connected = calls.filter(c => c.minutes > 0);

  // --- core stats ---
  const totalMin = connected.reduce((s,c)=>s+c.minutes,0);
  const totalCalls = connected.length;
  const avg = totalCalls ? Math.round(totalMin/totalCalls) : 0;

  // summer window
  const start = new Date(data.summerStart+"T00:00:00Z");
  const end   = new Date(data.summerEnd+"T00:00:00Z");
  const today = new Date(); today.setUTCHours(0,0,0,0);
  const DAY = 86400000;
  const totalDays = Math.round((end-start)/DAY)+1;
  const clampToday = today < start ? start : (today > end ? end : today);
  const daysElapsed = Math.round((clampToday-start)/DAY)+1;
  const daysLeft = Math.max(0, Math.round((end-clampToday)/DAY));
  const progressPct = Math.min(100, Math.max(0, (daysElapsed/totalDays)*100));

  // % of summer elapsed spent on call
  const minutesElapsed = daysElapsed*24*60;
  const pctOnCall = minutesElapsed ? (totalMin/minutesElapsed*100) : 0;

  // --- records ---
  let longest = connected.reduce((a,c)=> c.minutes>a.minutes?c:a, {minutes:-1});
  // most-called day
  const byDay = {};
  connected.forEach(c => byDay[c.date] = (byDay[c.date]||0)+1);
  let mostDay=null, mostCount=0;
  Object.entries(byDay).forEach(([d,n])=>{ if(n>mostCount){mostCount=n;mostDay=d;} });
  // longest single day by total time
  const timeByDay = {};
  connected.forEach(c => timeByDay[c.date]=(timeByDay[c.date]||0)+c.minutes);
  let bestTimeDay=null, bestTime=0;
  Object.entries(timeByDay).forEach(([d,t])=>{ if(t>bestTime){bestTime=t;bestTimeDay=d;} });

  document.getElementById("subline").innerHTML =
    `<b>${fmtLongDur(totalMin)}</b> together across <b>${totalCalls}</b> calls`;
  document.getElementById("span-dates").textContent =
    `${start.toLocaleDateString("en-GB",{day:"numeric",month:"long",timeZone:"UTC"})} – ${end.toLocaleDateString("en-GB",{day:"numeric",month:"long",timeZone:"UTC"})}`;

  // hero countdown: sun drifts across the summer
  const endLabel = end.toLocaleDateString("en-GB",{day:"numeric",month:"short",timeZone:"UTC"});
  requestAnimationFrame(()=>{
    document.getElementById("trackFill").style.width = progressPct.toFixed(1)+"%";
    document.getElementById("sun").style.left = progressPct.toFixed(1)+"%";
  });

  // ---------- build DOM ----------
  const app = document.getElementById("app");

  // stat cards
  const stats = `
  <div class="grid stats">
    <div class="card"><div class="k">Time on call</div>
      <div class="v">${Math.floor(totalMin/60)}<small>hr</small> ${totalMin%60}<small>min</small></div>
      <div class="cap">${totalMin.toLocaleString()} minutes, all yours</div></div>
    <div class="card"><div class="k">Calls connected</div>
      <div class="v">${totalCalls}</div>
      <div class="cap">since the goodbye on 4 Jun</div></div>
    <div class="card"><div class="k">Average call</div>
      <div class="v">${avg}<small>min</small></div>
      <div class="cap">${fmtLongDur(avg)} a sitting</div></div>
    <div class="card"><div class="k">Days reunited in</div>
      <div class="v" id="stat-days">${daysLeft}</div>
      <div class="cap">until 15 Sep</div></div>
  </div>`;

  // summer spent talking
  const talking = `
  <div class="panel" style="margin-top:16px">
    <h2>Summer spent on call</h2>
    <p class="lead">Of every hour apart so far, this much was voice-to-voice.</p>
    <div class="pct-big">${pctOnCall.toFixed(2)}<small>%</small></div>
    <div class="bar"><i style="width:${Math.min(100,pctOnCall*4).toFixed(2)}%"></i></div>
    <div class="bar-note"><span>${fmtLongDur(totalMin)} on call</span><span>${daysElapsed} days elapsed</span></div>
  </div>`;

  // records
  const records = `
  <div class="sec-label">records</div>
  <div class="panel records">
    <div class="rec-list">
      <div class="rec"><div class="ico">⏳</div><div>
        <div class="rk">Longest single call</div>
        <div class="rv">${fmtLongDur(longest.minutes)}</div>
        <div class="rd">${prettyDate(longest.date)} · ${longest.time}</div></div></div>
      <div class="rec"><div class="ico">📞</div><div>
        <div class="rk">Most calls in a day</div>
        <div class="rv">${mostCount} calls</div>
        <div class="rd">${prettyDate(mostDay)}</div></div></div>
      <div class="rec"><div class="ico">🌙</div><div>
        <div class="rk">Most time in a day</div>
        <div class="rv">${fmtLongDur(bestTime)}</div>
        <div class="rd">${prettyDate(bestTimeDay)}</div></div></div>
    </div>
  </div>`;

  // heatmap (GitHub style, weeks as columns, Mon..Sun rows)
  const heat = buildHeat(timeByDay, start, end, today);

  // log
  const log = buildLog(calls);

  app.innerHTML = stats + talking + records + heat + log;
  wireHeatTip();
  startCountdown(data.summerEnd, endLabel);
}

// live countdown to reunion — days in the caption, hrs/min/sec ticking below
function startCountdown(summerEnd, endLabel){
  const [ey,em,ed] = summerEnd.split("-").map(Number);
  // count down to the END of the reunion day, so today counts as a full day
  // apart and the day figure reads 85 rather than 84
  const target = new Date(ey, em-1, ed+1, 0, 0, 0, 0);
  const cap = document.getElementById("countCaption");
  const statDays = document.getElementById("stat-days");
  const elD = {h:document.getElementById("cd-h"), m:document.getElementById("cd-m"), s:document.getElementById("cd-s")};
  const pad = n => String(n).padStart(2,"0");

  function tick(){
    let diff = target - new Date();
    if(diff < 0) diff = 0;
    const tot   = Math.floor(diff/1000);
    const days  = Math.floor(tot/86400);
    const hrs   = Math.floor(tot/3600);          // total hours left, standalone (on-page ticker)
    const hrsSub= Math.floor((tot%86400)/3600);  // hours within the day (tab title, alongside days)
    const min   = Math.floor((tot%3600)/60);
    const sec   = tot%60;

    cap.innerHTML = days>0
      ? `<b>${days}</b> more sunsets apart — until we're back together on <b>${endLabel}</b>`
      : `the last day apart — back together on <b>${endLabel}</b>`;
    if(statDays) statDays.textContent = days;
    elD.h.textContent = hrs;
    elD.m.textContent = pad(min);
    elD.s.textContent = pad(sec);

    // live countdown in the tab title, like a focus timer
    document.title = `${days}d ${pad(hrsSub)}:${pad(min)}:${pad(sec)} · our summer on call`;

    if(diff === 0){
      if(startCountdown._t) clearInterval(startCountdown._t);
      if(startCountdown._w) startCountdown._w.terminate();
    }
  }
  tick();
  // Drive the tick from a Web Worker so the tab title keeps counting while the
  // tab is in the background — background setInterval gets throttled to ~1/min.
  try{
    const blob = new Blob(["setInterval(function(){postMessage(0)},1000)"], {type:"application/javascript"});
    startCountdown._w = new Worker(URL.createObjectURL(blob));
    startCountdown._w.onmessage = tick;
  }catch(e){
    startCountdown._t = setInterval(tick, 1000);
  }
  // Snap to the correct time the instant the tab becomes visible again.
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) tick(); });
}

function colorFor(min){
  if(min<=0) return "rgba(255,255,255,.05)";
  if(min<30)  return "rgba(255,179,138,.30)";
  if(min<90)  return "rgba(255,159,138,.55)";
  if(min<180) return "rgba(255,126,107,.80)";
  return "rgba(255,159,178,1)";
}

function buildHeat(timeByDay, start, end, today){
  // align grid to the Monday on/before start
  const gridStart = new Date(start);
  const dow = (gridStart.getUTCDay()+6)%7; // Mon=0
  gridStart.setUTCDate(gridStart.getUTCDate()-dow);
  const DAY=86400000;
  const cells=[];
  for(let t=gridStart.getTime(); t<=end.getTime(); t+=DAY){
    const dt=new Date(t);
    const iso=dt.toISOString().slice(0,10);
    const inRange = dt>=start && dt<=end;
    const future = dt>today;
    const min = timeByDay[iso]||0;
    cells.push({iso,inRange,future,min,
      day:dt.getUTCDate(),mon:dt.getUTCMonth()});
  }
  const cellHTML = cells.map(c=>{
    if(!c.inRange) return `<span class="cell" data-out="1" style="visibility:hidden"></span>`;
    const bg = c.future ? "rgba(255,255,255,.03)" : colorFor(c.min);
    const label = c.future ? "yet to come"
      : (c.min? `${fmtLongDur(c.min)} on call` : "no calls");
    return `<span class="cell" style="background:${bg}" data-iso="${c.iso}" data-label="${label}"></span>`;
  }).join("");

  return `
  <div class="sec-label">day by day</div>
  <div class="panel">
    <div class="heat-head">
      <div><h2>Call heatmap</h2><p class="lead" style="margin-bottom:0">Warmer squares, longer talks. Every box is a day of summer.</p></div>
    </div>
    <div class="heat-scroll"><div class="heat" id="heat">${cellHTML}</div></div>
    <div class="legend">
      <span style="color:var(--coral)">♥</span>
      <span class="sw" style="background:rgba(255,255,255,.05)"></span>
      <span class="sw" style="background:rgba(255,179,138,.30)"></span>
      <span class="sw" style="background:rgba(255,159,138,.55)"></span>
      <span class="sw" style="background:rgba(255,126,107,.80)"></span>
      <span class="sw" style="background:rgba(255,159,178,1)"></span>
      <span style="color:var(--coral)">♥♥♥</span>
    </div>
  </div>`;
}

function buildLog(calls){
  const sorted = calls.slice().sort((a,b)=>
    (b.date+ "T"+ b.time).localeCompare(a.date+"T"+a.time));
  const rows = sorted.map(c=>{
    return `<div class="row">
      <span><span class="date">${prettyDate(c.date)}</span> <span class="time">· ${c.time}</span></span>
      <span class="dur">${fmtDur(c.minutes)}</span>
    </div>`;
  }).join("");

  return `
  <div class="sec-label">full log</div>
  <div class="log-head">
    <div class="lead" style="margin:0;color:var(--muted)">${sorted.length} calls · newest first</div>
  </div>
  <div class="log" id="log">${rows}</div>`;
}

function wireHeatTip(){
  // heatmap tooltip
  const tip=document.getElementById("tip");
  const heat=document.getElementById("heat");
  if(heat){
    heat.addEventListener("mouseover",e=>{
      const c=e.target.closest(".cell[data-iso]"); if(!c)return;
      tip.innerHTML=`<b>${prettyDate(c.dataset.iso)}</b><br>${c.dataset.label}`;
      tip.classList.add("show");
    });
    heat.addEventListener("mousemove",e=>{
      tip.style.left=Math.min(window.innerWidth-210,e.clientX+12)+"px";
      tip.style.top=(e.clientY+14)+"px";
    });
    heat.addEventListener("mouseout",()=>tip.classList.remove("show"));
  }
}
</script>
</body>
</html>
